<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>离线图片处理工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --bg-card: #1e1e3f;
    --border: #2a2a5a;
    --text-primary: #e8e8f0;
    --text-secondary: #a0a0c0;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
  }
  
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }
  
  .app {
    display: flex;
    height: 100vh;
    width: 100vw;
  }
  
  .sidebar {
    width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  
  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  
  .sidebar-header p {
    font-size: 12px;
    color: var(--text-secondary);
  }
  
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 8px;
    color: var(--text-primary);
    background: var(--bg-tertiary);
  }
  
  .btn:last-child { margin-bottom: 0; }
  
  .btn:hover { background: var(--accent); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  
  .btn-success { background: var(--success); }
  .btn-success:hover { background: #059669; }
  
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #dc2626; }
  
  .btn-warning { background: var(--warning); color: #1a1a2e; }
  .btn-warning:hover { background: #d97706; color: #1a1a2e; }
  
  .btn-icon {
    width: 16px;
    height: 16px;
  }
  
  .control-group {
    margin-bottom: 12px;
  }
  
  .control-group:last-child { margin-bottom: 0; }
  
  .control-label {
    display: block;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  
  .control-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .input-range {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--bg-tertiary);
    outline: none;
  }
  
  .input-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .input-range::-webkit-slider-thumb:hover { background: var(--accent-hover); }
  
  .range-value {
    font-size: 12px;
    color: var(--text-secondary);
    min-width: 40px;
    text-align: right;
  }
  
  .input-color {
    width: 40px;
    height: 32px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }
  
  .input-color:hover { border-color: var(--accent); }
  
  .input-text {
    flex: 1;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  
  .input-text:focus { border-color: var(--accent); }
  
  .radio-group {
    display: flex;
    gap: 8px;
  }
  
  .radio-btn {
    flex: 1;
    padding: 8px;
    text-align: center;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .radio-btn.active {
    background: var(--accent);
    border-color: var(--accent);
  }
  
  .radio-btn:hover:not(.active) { border-color: var(--accent); }
  
  .swatches {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  
  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  
  .swatch:hover { transform: scale(1.1); border-color: var(--text-primary); }
  .swatch.active { border-color: var(--accent); }
  
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
  }
  
  .toolbar {
    height: 48px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  
  .toolbar-left, .toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .toolbar-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  
  .toolbar-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-primary);
    transition: all 0.2s;
  }
  
  .toolbar-btn:hover:not(:disabled) { background: var(--accent); }
  .toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  
  .zoom-display {
    font-size: 13px;
    color: var(--text-secondary);
    min-width: 50px;
    text-align: center;
  }
  
  .canvas-container {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background-image:
      linear-gradient(45deg, #2a2a4a 25%, transparent 25%),
      linear-gradient(-45deg, #2a2a4a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #2a2a4a 75%),
      linear-gradient(-45deg, transparent 75%, #2a2a4a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  }
  
  .canvas-wrapper {
    position: relative;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    background: var(--bg-card);
  }
  
  #mainCanvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
  }
  
  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(26, 26, 46, 0.95);
    border: 2px dashed var(--border);
    transition: all 0.3s;
    cursor: pointer;
  }
  
  .drop-zone.drag-over {
    background: rgba(99, 102, 241, 0.15);
    border-color: var(--accent);
  }
  
  .drop-zone.hidden { display: none; }
  
  .drop-icon {
    width: 64px;
    height: 64px;
    opacity: 0.6;
  }
  
  .drop-text {
    font-size: 16px;
    color: var(--text-secondary);
  }
  
  .drop-text strong {
    color: var(--accent);
  }
  
  .drop-hint {
    font-size: 12px;
    color: var(--text-secondary);
    opacity: 0.7;
  }
  
  .status-bar {
    height: 32px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  
  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
  }
  
  .crop-mode .canvas-container { cursor: crosshair; }
  
  .crop-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  
  .crop-rect {
    position: absolute;
    border: 2px dashed var(--accent);
    background: rgba(99, 102, 241, 0.1);
    pointer-events: all;
    cursor: move;
    display: none;
  }
  
  .crop-rect.active { display: block; }
  
  .crop-handle {
    position: absolute;
    width: 10px;
    height: 10px;
    background: var(--accent);
    border: 2px solid white;
    border-radius: 2px;
  }
  
  .crop-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
  .crop-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
  .crop-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
  .crop-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
  .crop-handle.n { top: -5px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
  .crop-handle.s { bottom: -5px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
  .crop-handle.e { right: -5px; top: 50%; transform: translateY(-50%); cursor: e-resize; }
  .crop-handle.w { left: -5px; top: 50%; transform: translateY(-50%); cursor: w-resize; }
  
  .crop-mask {
    position: absolute;
    background: rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }
  
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 10px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
  }
  
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>🎨 图片处理工具</h1>
      <p>纯本地处理，保护您的隐私</p>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title">图片上传</div>
      <button class="btn btn-primary" id="uploadBtn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        选择图片
      </button>
      <button class="btn" id="clearBtn" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        清除画布
      </button>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title">智能抠图</div>
      <button class="btn btn-warning" id="removeBgBtn" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        一键抠除纯色背景
      </button>
      <div class="control-group" style="margin-top: 12px;">
        <label class="control-label">抠图容差</label>
        <div class="control-row">
          <input type="range" class="input-range" id="toleranceRange" min="0" max="100" value="30">
          <span class="range-value" id="toleranceValue">30</span>
        </div>
      </div>
      <div class="control-group">
        <label class="control-label">边缘羽化</label>
        <div class="control-row">
          <input type="range" class="input-range" id="featherRange" min="0" max="20" value="2">
          <span class="range-value" id="featherValue">2</span>
        </div>
      </div>
      <button class="btn" id="pickBgColorBtn" disabled style="margin-top: 8px;">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
        </svg>
        点击画布取色抠图
      </button>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title">背景设置</div>
      <div class="control-group">
        <label class="control-label">背景类型</label>
        <div class="radio-group" id="bgTypeGroup">
          <div class="radio-btn active" data-type="transparent">透明</div>
          <div class="radio-btn" data-type="solid">纯色</div>
          <div class="radio-btn" data-type="gradient">渐变</div>
        </div>
      </div>
      <div class="control-group" id="solidBgGroup" style="display: none;">
        <label class="control-label">背景颜色</label>
        <div class="control-row">
          <input type="color" class="input-color" id="bgColor" value="#ffffff">
          <input type="text" class="input-text" id="bgColorHex" value="#ffffff">
        </div>
        <div class="swatches" style="margin-top: 8px;">
          <div class="swatch" data-color="#ffffff" style="background: #ffffff;"></div>
          <div class="swatch" data-color="#000000" style="background: #000000;"></div>
          <div class="swatch" data-color="#ef4444" style="background: #ef4444;"></div>
          <div class="swatch" data-color="#f59e0b" style="background: #f59e0b;"></div>
          <div class="swatch" data-color="#10b981" style="background: #10b981;"></div>
          <div class="swatch" data-color="#3b82f6" style="background: #3b82f6;"></div>
          <div class="swatch" data-color="#6366f1" style="background: #6366f1;"></div>
          <div class="swatch" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
          <div class="swatch" data-color="#ec4899" style="background: #ec4899;"></div>
          <div class="swatch" data-color="#64748b" style="background: #64748b;"></div>
          <div class="swatch" data-color="#0ea5e9" style="background: #0ea5e9;"></div>
          <div class="swatch" data-color="#f43f5e" style="background: #f43f5e;"></div>
        </div>
      </div>
      <div class="control-group" id="gradientBgGroup" style="display: none;">
        <label class="control-label">渐变起始色</label>
        <div class="control-row">
          <input type="color" class="input-color" id="gradientStart" value="#667eea">
          <input type="text" class="input-text" id="gradientStartHex" value="#667eea">
        </div>
        <div style="height: 8px;"></div>
        <label class="control-label">渐变结束色</label>
        <div class="control-row">
          <input type="color" class="input-color" id="gradientEnd" value="#764ba2">
          <input type="text" class="input-text" id="gradientEndHex" value="#764ba2">
        </div>
        <div style="height: 8px;"></div>
        <label class="control-label">渐变角度</label>
        <div class="control-row">
          <input type="range" class="input-range" id="gradientAngle" min="0" max="360" value="135">
          <span class="range-value" id="gradientAngleValue">135°</span>
        </div>
      </div>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title">裁剪</div>
      <button class="btn" id="cropBtn" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
          <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
        </svg>
        启用裁剪模式
      </button>
      <button class="btn btn-success" id="applyCropBtn" disabled style="display: none;">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        应用裁剪
      </button>
      <button class="btn btn-danger" id="cancelCropBtn" disabled style="display: none;">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        取消裁剪
      </button>
    </div>
    
    <div class="sidebar-section">
      <div class="section-title">导出</div>
      <button class="btn btn-success" id="exportBtn" disabled>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        导出 PNG 图片
      </button>
    </div>
  </aside>
  
  <main class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="toolbar-btn" id="undoBtn" disabled title="撤销 (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="redoBtn" disabled title="重做 (Ctrl+Y)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 7v6h-6"/>
            <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-center">
        <button class="toolbar-btn" id="zoomOutBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <span class="zoom-display" id="zoomDisplay">100%</span>
        <button class="toolbar-btn" id="zoomInBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button class="toolbar-btn" id="zoomFitBtn" disabled title="适应窗口">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h6v6"/>
            <path d="M9 21H3v-6"/>
            <path d="M21 3l-7 7"/>
            <path d="M3 21l7-7"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-right">
      </div>
    </div>
    
    <div class="canvas-container" id="canvasContainer">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
        <div class="crop-overlay" id="cropOverlay">
          <div class="crop-mask" id="cropMaskTop"></div>
          <div class="crop-mask" id="cropMaskRight"></div>
          <div class="crop-mask" id="cropMaskBottom"></div>
          <div class="crop-mask" id="cropMaskLeft"></div>
          <div class="crop-rect" id="cropRect">
            <div class="crop-handle nw" data-handle="nw"></div>
            <div class="crop-handle n" data-handle="n"></div>
            <div class="crop-handle ne" data-handle="ne"></div>
            <div class="crop-handle e" data-handle="e"></div>
            <div class="crop-handle se" data-handle="se"></div>
            <div class="crop-handle s" data-handle="s"></div>
            <div class="crop-handle sw" data-handle="sw"></div>
            <div class="crop-handle w" data-handle="w"></div>
          </div>
        </div>
      </div>
      <div class="drop-zone" id="dropZone">
        <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="drop-text">
          <strong>点击选择</strong> 或将图片拖拽到此处
        </div>
        <div class="drop-hint">支持 PNG、JPG、WebP 格式</div>
      </div>
    </div>
    
    <div class="status-bar">
      <div class="status-item">
        <span class="status-dot"></span>
        <span>本地处理中</span>
      </div>
      <div class="status-item" id="statusSize" style="display: none;">
        <span>尺寸: --</span>
      </div>
      <div class="status-item" id="statusFile" style="display: none;">
        <span>文件: --</span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept="image/*" style="display: none;">

<script>
(function() {
  const state = {
    canvas: null,
    ctx: null,
    width: 0,
    height: 0,
    zoom: 1,
    history: [],
    historyIndex: -1,
    imageLoaded: false,
    cropMode: false,
    cropRect: { x: 0, y: 0, w: 0, h: 0 },
    isPickingColor: false,
    bgType: 'transparent',
    bgColor: '#ffffff',
    gradientStart: '#667eea',
    gradientEnd: '#764ba2',
    gradientAngle: 135,
    originalImageData: null
  };

  const $ = id => document.getElementById(id);

  const canvas = $('mainCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  state.canvas = canvas;
  state.ctx = ctx;

  function showToast(message, type = '') {
    const toast = $('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function saveHistory() {
    if (!state.imageLoaded) return;
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    state.history = state.history.slice(0, state.historyIndex + 1);
    state.history.push({
      width: canvas.width,
      height: canvas.height,
      imageData: new ImageData(new Uint8ClampedArray(imageData.data), imageData.width, imageData.height)
    });
    state.historyIndex = state.history.length - 1;
    updateHistoryButtons();
  }

  function undo() {
    if (state.historyIndex <= 0) return;
    state.historyIndex--;
    restoreFromHistory();
  }

  function redo() {
    if (state.historyIndex >= state.history.length - 1) return;
    state.historyIndex++;
    restoreFromHistory();
  }

  function restoreFromHistory() {
    const entry = state.history[state.historyIndex];
    if (!entry) return;
    canvas.width = entry.width;
    canvas.height = entry.height;
    state.width = entry.width;
    state.height = entry.height;
    ctx.putImageData(entry.imageData, 0, 0);
    updateStatusSize();
    updateHistoryButtons();
    renderWithBackground();
  }

  function updateHistoryButtons() {
    $('undoBtn').disabled = state.historyIndex <= 0;
    $('redoBtn').disabled = state.historyIndex >= state.history.length - 1;
  }

  function updateImageButtons(enabled) {
    state.imageLoaded = enabled;
    $('clearBtn').disabled = !enabled;
    $('removeBgBtn').disabled = !enabled;
    $('pickBgColorBtn').disabled = !enabled;
    $('cropBtn').disabled = !enabled;
    $('exportBtn').disabled = !enabled;
    $('zoomInBtn').disabled = !enabled;
    $('zoomOutBtn').disabled = !enabled;
    $('zoomFitBtn').disabled = !enabled;
  }

  function updateStatusSize() {
    $('statusSize').textContent = `尺寸: ${canvas.width} × ${canvas.height}`;
    $('statusSize').style.display = 'flex';
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      showToast('请选择有效的图片文件', 'error');
      return;
    }

    $('statusFile').textContent = `文件: ${file.name}`;
    $('statusFile').style.display = 'flex';

    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        state.history = [];
        state.historyIndex = -1;
        loadImageToCanvas(img);
        saveHistory();
        state.originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        updateImageButtons(true);
        $('dropZone').classList.add('hidden');
        showToast('图片加载成功', 'success');
      };
      img.onerror = () => showToast('图片加载失败', 'error');
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function loadImageToCanvas(img) {
    const maxSize = 2048;
    let w = img.naturalWidth;
    let h = img.naturalHeight;
    
    if (w > maxSize || h > maxSize) {
      const ratio = Math.min(maxSize / w, maxSize / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }

    canvas.width = w;
    canvas.height = h;
    state.width = w;
    state.height = h;
    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    updateStatusSize();
    fitZoom();
    renderWithBackground();
  }

  function createBackgroundStyle() {
    if (state.bgType === 'transparent') return null;
    
    if (state.bgType === 'solid') return state.bgColor;
    
    if (state.bgType === 'gradient') {
      const angle = state.gradientAngle * Math.PI / 180;
      const x1 = canvas.width / 2 - Math.cos(angle) * canvas.width;
      const y1 = canvas.height / 2 - Math.sin(angle) * canvas.height;
      const x2 = canvas.width / 2 + Math.cos(angle) * canvas.width;
      const y2 = canvas.height / 2 + Math.sin(angle) * canvas.height;
      const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
      gradient.addColorStop(0, state.gradientStart);
      gradient.addColorStop(1, state.gradientEnd);
      return gradient;
    }
    return null;
  }

  function renderWithBackground() {
    const bgStyle = createBackgroundStyle();
    if (!bgStyle) {
      canvas.style.background = '';
      return;
    }
    
    if (typeof bgStyle === 'string') {
      canvas.style.background = bgStyle;
    } else {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.fillStyle = bgStyle;
      tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      tempCtx.drawImage(canvas, 0, 0);
      canvas.style.background = `url(${tempCanvas.toDataURL()})`;
    }
  }

  function floodFillRemoveBg(targetR, targetG, targetB, tolerance, feather) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const w = canvas.width;
    const h = canvas.height;
    
    const tol2 = tolerance * tolerance * 3;
    const visited = new Uint8Array(w * h);
    const mask = new Uint8Array(w * h);
    
    const queue = [];
    for (let x = 0; x < w; x++) {
      queue.push([x, 0]);
      queue.push([x, h - 1]);
    }
    for (let y = 0; y < h; y++) {
      queue.push([0, y]);
      queue.push([w - 1, y]);
    }
    
    while (queue.length > 0) {
      const [x, y] = queue.pop();
      const idx = y * w + x;
      
      if (x < 0 || x >= w || y < 0 || y >= h || visited[idx]) continue;
      visited[idx] = 1;
      
      const p = idx * 4;
      const dr = data[p] - targetR;
      const dg = data[p + 1] - targetG;
      const db = data[p + 2] - targetB;
      const dist2 = dr * dr + dg * dg + db * db;
      
      if (dist2 <= tol2) {
        mask[idx] = 1;
        queue.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
      }
    }
    
    if (feather > 0) {
      const tempMask = new Uint8Array(mask);
      const r = feather;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          if (mask[idx] === 1) continue;
          
          let count = 0;
          let total = 0;
          for (let dy = -r; dy <= r; dy++) {
            for (let dx = -r; dx <= r; dx++) {
              const nx = x + dx;
              const ny = y + dy;
              if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                total++;
                if (tempMask[ny * w + nx] === 1) count++;
              }
            }
          }
          if (count / total > 0.5) mask[idx] = 2;
        }
      }
    }
    
    for (let i = 0; i < mask.length; i++) {
      if (mask[i] > 0) {
        const p = i * 4;
        if (feather > 0 && mask[i] === 2) {
          data[p + 3] = Math.max(0, data[p + 3] - 128);
        } else {
          data[p + 3] = 0;
        }
      }
    }
    
    ctx.putImageData(imageData, 0, 0);
  }

  function getColorAtPosition(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.floor((e.clientX - rect.left) * scaleX);
    const y = Math.floor((e.clientY - rect.top) * scaleY);
    
    if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return null;
    const pixel = ctx.getImageData(x, y, 1, 1).data;
    return { r: pixel[0], g: pixel[1], b: pixel[2] };
  }

  function startCropMode() {
    if (!state.imageLoaded) return;
    state.cropMode = true;
    document.body.classList.add('crop-mode');
    
    const margin = Math.min(canvas.width, canvas.height) * 0.1;
    state.cropRect = {
      x: margin,
      y: margin,
      w: canvas.width - margin * 2,
      h: canvas.height - margin * 2
    };
    
    $('cropBtn').style.display = 'none';
    $('applyCropBtn').style.display = 'flex';
    $('cancelCropBtn').style.display = 'flex';
    $('applyCropBtn').disabled = false;
    $('cancelCropBtn').disabled = false;
    
    updateCropOverlay();
  }

  function endCropMode(apply = false) {
    state.cropMode = false;
    document.body.classList.remove('crop-mode');
    $('cropRect').classList.remove('active');
    $('cropBtn').style.display = 'flex';
    $('applyCropBtn').style.display = 'none';
    $('cancelCropBtn').style.display = 'none';
    
    ['cropMaskTop', 'cropMaskRight', 'cropMaskBottom', 'cropMaskLeft'].forEach(id => {
      $(id).style.display = 'none';
    });
    
    if (apply) applyCrop();
  }

  function applyCrop() {
    const { x, y, w, h } = state.cropRect;
    const ix = Math.max(0, Math.floor(x));
    const iy = Math.max(0, Math.floor(y));
    const iw = Math.min(canvas.width - ix, Math.floor(w));
    const ih = Math.min(canvas.height - iy, Math.floor(h));
    
    if (iw < 10 || ih < 10) {
      showToast('裁剪区域太小', 'error');
      return;
    }
    
    saveHistory();
    
    const cropped = ctx.getImageData(ix, iy, iw, ih);
    canvas.width = iw;
    canvas.height = ih;
    state.width = iw;
    state.height = ih;
    ctx.putImageData(cropped, 0, 0);
    updateStatusSize();
    fitZoom();
    renderWithBackground();
    showToast('裁剪成功', 'success');
  }

  function updateCropOverlay() {
    const wrapper = $('canvasWrapper');
    const rect = canvas.getBoundingClientRect();
    const wrapRect = wrapper.getBoundingClientRect();
    
    const scaleX = rect.width / canvas.width;
    const scaleY = rect.height / canvas.height;
    
    const offsetX = rect.left - wrapRect.left;
    const offsetY = rect.top - wrapRect.top;
    
    const cropRectEl = $('cropRect');
    cropRectEl.classList.add('active');
    cropRectEl.style.left = (offsetX + state.cropRect.x * scaleX) + 'px';
    cropRectEl.style.top = (offsetY + state.cropRect.y * scaleY) + 'px';
    cropRectEl.style.width = (state.cropRect.w * scaleX) + 'px';
    cropRectEl.style.height = (state.cropRect.h * scaleY) + 'px';
    
    const masks = {
      cropMaskTop: { left: offsetX, top: offsetY, w: rect.width, h: state.cropRect.y * scaleY },
      cropMaskLeft: { left: offsetX, top: offsetY + state.cropRect.y * scaleY, w: state.cropRect.x * scaleX, h: state.cropRect.h * scaleY },
      cropMaskRight: { left: offsetX + (state.cropRect.x + state.cropRect.w) * scaleX, top: offsetY + state.cropRect.y * scaleY, w: rect.width - (state.cropRect.x + state.cropRect.w) * scaleX, h: state.cropRect.h * scaleY },
      cropMaskBottom: { left: offsetX, top: offsetY + (state.cropRect.y + state.cropRect.h) * scaleY, w: rect.width, h: rect.height - (state.cropRect.y + state.cropRect.h) * scaleY }
    };
    
    Object.keys(masks).forEach(id => {
      const m = masks[id];
      const el = $(id);
      el.style.display = 'block';
      el.style.left = m.left + 'px';
      el.style.top = m.top + 'px';
      el.style.width = Math.max(0, m.w) + 'px';
      el.style.height = Math.max(0, m.h) + 'px';
    });
  }

  function fitZoom() {
    const container = $('canvasContainer');
    const padding = 40;
    const maxW = container.clientWidth - padding;
    const maxH = container.clientHeight - padding;
    const zoom = Math.min(maxW / canvas.width, maxH / canvas.height, 1);
    setZoom(zoom);
  }

  function setZoom(zoom) {
    state.zoom = Math.max(0.1, Math.min(5, zoom));
    canvas.style.width = (canvas.width * state.zoom) + 'px';
    canvas.style.height = (canvas.height * state.zoom) + 'px';
    $('zoomDisplay').textContent = Math.round(state.zoom * 100) + '%';
    if (state.cropMode) updateCropOverlay();
  }

  function exportPNG() {
    if (!state.imageLoaded) return;
    
    const bgStyle = createBackgroundStyle();
    let finalCanvas = canvas;
    
    if (bgStyle) {
      finalCanvas = document.createElement('canvas');
      finalCanvas.width = canvas.width;
      finalCanvas.height = canvas.height;
      const fctx = finalCanvas.getContext('2d');
      fctx.fillStyle = bgStyle;
      fctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
      fctx.drawImage(canvas, 0, 0);
    }
    
    const link = document.createElement('a');
    link.download = `processed-image-${Date.now()}.png`;
    link.href = finalCanvas.toDataURL('image/png');
    link.click();
    showToast('图片导出成功', 'success');
  }

  function clearCanvas() {
    if (!state.imageLoaded) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    state.history = [];
    state.historyIndex = -1;
    updateHistoryButtons();
    updateImageButtons(false);
    $('dropZone').classList.remove('hidden');
    $('statusSize').style.display = 'none';
    $('statusFile').style.display = 'none';
    canvas.style.width = '';
    canvas.style.height = '';
    showToast('画布已清除');
  }

  function initEventListeners() {
    $('uploadBtn').addEventListener('click', () => $('fileInput').click());
    $('fileInput').addEventListener('change', e => handleFile(e.target.files[0]));
    $('dropZone').addEventListener('click', () => $('fileInput').click());
    
    const container = $('canvasContainer');
    container.addEventListener('dragover', e => {
      e.preventDefault();
      $('dropZone').classList.add('drag-over');
    });
    container.addEventListener('dragleave', () => $('dropZone').classList.remove('drag-over'));
    container.addEventListener('drop', e => {
      e.preventDefault();
      $('dropZone').classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });
    
    $('clearBtn').addEventListener('click', clearCanvas);
    $('undoBtn').addEventListener('click', undo);
    $('redoBtn').addEventListener('click', redo);
    
    $('zoomInBtn').addEventListener('click', () => setZoom(state.zoom * 1.2));
    $('zoomOutBtn').addEventListener('click', () => setZoom(state.zoom / 1.2));
    $('zoomFitBtn').addEventListener('click', fitZoom);
    
    $('removeBgBtn').addEventListener('click', () => {
      saveHistory();
      const tolerance = parseInt($('toleranceRange').value);
      const feather = parseInt($('featherRange').value);
      
      const cornerColors = [
        ctx.getImageData(0, 0, 1, 1).data,
        ctx.getImageData(canvas.width - 1, 0, 1, 1).data,
        ctx.getImageData(0, canvas.height - 1, 1, 1).data,
        ctx.getImageData(canvas.width - 1, canvas.height - 1, 1, 1).data
      ];
      
      const avgR = cornerColors.reduce((s, c) => s + c[0], 0) / 4;
      const avgG = cornerColors.reduce((s, c) => s + c[1], 0) / 4;
      const avgB = cornerColors.reduce((s, c) => s + c[2], 0) / 4;
      
      floodFillRemoveBg(avgR, avgG, avgB, tolerance * 2.55, feather);
      renderWithBackground();
      showToast('抠图完成', 'success');
    });
    
    $('toleranceRange').addEventListener('input', e => {
      $('toleranceValue').textContent = e.target.value;
    });
    $('featherRange').addEventListener('input', e => {
      $('featherValue').textContent = e.target.value;
    });
    
    $('pickBgColorBtn').addEventListener('click', () => {
      state.isPickingColor = true;
      showToast('请点击画布上要抠除的颜色');
    });
    
    canvas.addEventListener('click', e => {
      if (!state.isPickingColor) return;
      const color = getColorAtPosition(e);
      if (color) {
        saveHistory();
        const tolerance = parseInt($('toleranceRange').value);
        const feather = parseInt($('featherRange').value);
        floodFillRemoveBg(color.r, color.g, color.b, tolerance * 2.55, feather);
        renderWithBackground();
        showToast('抠图完成', 'success');
      }
      state.isPickingColor = false;
    });
    
    document.querySelectorAll('#bgTypeGroup .radio-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#bgTypeGroup .radio-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const type = btn.dataset.type;
        state.bgType = type;
        $('solidBgGroup').style.display = type === 'solid' ? 'block' : 'none';
        $('gradientBgGroup').style.display = type === 'gradient' ? 'block' : 'none';
        renderWithBackground();
      });
    });
    
    $('bgColor').addEventListener('input', e => {
      state.bgColor = e.target.value;
      $('bgColorHex').value = e.target.value;
      renderWithBackground();
    });
    $('bgColorHex').addEventListener('input', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        state.bgColor = e.target.value;
        $('bgColor').value = e.target.value;
        renderWithBackground();
      }
    });
    
    document.querySelectorAll('#solidBgGroup .swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.querySelectorAll('#solidBgGroup .swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
        const color = sw.dataset.color;
        state.bgColor = color;
        $('bgColor').value = color;
        $('bgColorHex').value = color;
        renderWithBackground();
      });
    });
    
    $('gradientStart').addEventListener('input', e => {
      state.gradientStart = e.target.value;
      $('gradientStartHex').value = e.target.value;
      renderWithBackground();
    });
    $('gradientStartHex').addEventListener('input', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        state.gradientStart = e.target.value;
        $('gradientStart').value = e.target.value;
        renderWithBackground();
      }
    });
    $('gradientEnd').addEventListener('input', e => {
      state.gradientEnd = e.target.value;
      $('gradientEndHex').value = e.target.value;
      renderWithBackground();
    });
    $('gradientEndHex').addEventListener('input', e => {
      if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
        state.gradientEnd = e.target.value;
        $('gradientEnd').value = e.target.value;
        renderWithBackground();
      }
    });
    $('gradientAngle').addEventListener('input', e => {
      state.gradientAngle = parseInt(e.target.value);
      $('gradientAngleValue').textContent = e.target.value + '°';
      renderWithBackground();
    });
    
    $('cropBtn').addEventListener('click', startCropMode);
    $('applyCropBtn').addEventListener('click', () => endCropMode(true));
    $('cancelCropBtn').addEventListener('click', () => endCropMode(false));
    
    let cropDragState = null;
    
    function getCropCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleX
      };
    }
    
    $('cropRect').addEventListener('mousedown', e => {
      if (!state.cropMode) return;
      e.stopPropagation();
      const handle = e.target.dataset.handle;
      const pos = getCropCanvasCoords(e);
      cropDragState = { handle, startX: pos.x, startY: pos.y, rect: { ...state.cropRect } };
    });
    
    $('canvasWrapper').addEventListener('mousedown', e => {
      if (!state.cropMode) return;
      if (e.target.closest('#cropRect')) return;
      const pos = getCropCanvasCoords(e);
      state.cropRect.x = pos.x;
      state.cropRect.y = pos.y;
      state.cropRect.w = 0;
      state.cropRect.h = 0;
      cropDragState = { handle: 'se', startX: pos.x, startY: pos.y, rect: { ...state.cropRect } };
      updateCropOverlay();
    });
    
    document.addEventListener('mousemove', e => {
      if (!cropDragState || !state.cropMode) return;
      const pos = getCropCanvasCoords(e);
      const dx = pos.x - cropDragState.startX;
      const dy = pos.y - cropDragState.startY;
      const r = cropDragState.rect;
      
      let { x, y, w, h } = r;
      
      switch (cropDragState.handle) {
        case 'move':
          x = r.x + dx;
          y = r.y + dy;
          break;
        case 'nw':
          x = r.x + dx;
          y = r.y + dy;
          w = r.w - dx;
          h = r.h - dy;
          break;
        case 'n':
          y = r.y + dy;
          h = r.h - dy;
          break;
        case 'ne':
          y = r.y + dy;
          w = r.w + dx;
          h = r.h - dy;
          break;
        case 'e':
          w = r.w + dx;
          break;
        case 'se':
          w = r.w + dx;
          h = r.h + dy;
          break;
        case 's':
          h = r.h + dy;
          break;
        case 'sw':
          x = r.x + dx;
          w = r.w - dx;
          h = r.h + dy;
          break;
        case 'w':
          x = r.x + dx;
          w = r.w - dx;
          break;
        default:
          x = r.x + dx;
          y = r.y + dy;
          w = r.w + dx;
          h = r.h + dy;
      }
      
      if (w < 5) { x = r.x + r.w - 5; w = 5; }
      if (h < 5) { y = r.y + r.h - 5; h = 5; }
      
      x = Math.max(0, Math.min(canvas.width - w, x));
      y = Math.max(0, Math.min(canvas.height - h, y));
      w = Math.min(w, canvas.width - x);
      h = Math.min(h, canvas.height - y);
      
      state.cropRect = { x, y, w, h };
      updateCropOverlay();
    });
    
    document.addEventListener('mouseup', () => {
      cropDragState = null;
    });
    
    $('exportBtn').addEventListener('click', exportPNG);
    
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
    });
    
    window.addEventListener('resize', () => {
      if (state.cropMode) updateCropOverlay();
    });
  }

  initEventListeners();
})();
</script>
</body>
</html>
